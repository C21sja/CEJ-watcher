name: CEJ Watcher

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  # Allow manual triggering
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: watcher
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify watcher syntax
        run: |
          python -m py_compile watcher.py

  run-watcher:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run watcher script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MENTION_EVERYONE: ${{ vars.DISCORD_MENTION_EVERYONE || 'true' }}
          DISCORD_MENTION: ${{ vars.DISCORD_MENTION || '@user' }}
          DISCORD_MENTION_USER_ID: ${{ vars.DISCORD_MENTION_USER_ID }}
        run: |
          python watcher.py

      - name: Commit state changes
        if: ${{ always() }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          test -f seen_ids.json || echo "[]" > seen_ids.json
          git add seen_ids.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen IDs" && git push)

  notify-failure:
    if: ${{ always() && (needs.verify.result == 'failure' || needs.run-watcher.result == 'failure') }}
    needs: [verify, run-watcher]
    runs-on: ubuntu-latest

    steps:
      - name: Alert Discord on workflow failure
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_MENTION_EVERYONE: ${{ vars.DISCORD_MENTION_EVERYONE || 'true' }}
          DISCORD_MENTION: ${{ vars.DISCORD_MENTION || '@user' }}
          DISCORD_MENTION_USER_ID: ${{ vars.DISCORD_MENTION_USER_ID }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          WATCHER_RESULT: ${{ needs.run-watcher.result }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import time
          import urllib.request
          import urllib.error

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL")
          if not webhook_url:
              print("DISCORD_WEBHOOK_URL is not set; skipping failure notification.")
              raise SystemExit(0)

          mention_everyone = (os.environ.get("DISCORD_MENTION_EVERYONE", "true") or "").strip().lower() in {"1", "true", "yes", "on"}
          mention_user_id = (os.environ.get("DISCORD_MENTION_USER_ID") or "").strip()
          mention_text = os.environ.get("DISCORD_MENTION") or "@user"
          if mention_everyone:
              mention_prefix = "@everyone "
              allowed_mentions = {"parse": ["everyone"]}
          else:
              if not mention_user_id:
                  match = re.search(r"\d{6,}", mention_text)
                  if match:
                      mention_user_id = match.group(0)

              if mention_user_id and not mention_user_id.isdigit():
                  match = re.search(r"\d{6,}", mention_user_id)
                  mention_user_id = match.group(0) if match else ""

          if not mention_everyone and mention_user_id:
              mention_prefix = f"<@{mention_user_id}> "
              allowed_mentions = {"parse": ["users"], "users": [mention_user_id]}
          elif not mention_everyone:
              mention_prefix = f"{mention_text} " if mention_text else ""
              allowed_mentions = None

          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          payload = {
              "content": (
                  f"{mention_prefix}:x: CEJ watcher workflow failed in `{os.environ['GITHUB_REPOSITORY']}` "
                  f"on `{os.environ['GITHUB_REF_NAME']}`.\n"
                  f"verify={os.environ['VERIFY_RESULT']}, run-watcher={os.environ['WATCHER_RESULT']}\n"
                  f"Run details: {run_url}"
              )
          }
          if allowed_mentions:
              payload["allowed_mentions"] = allowed_mentions

          req = urllib.request.Request(
              webhook_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
          )

          for attempt in range(1, 4):
              try:
                  urllib.request.urlopen(req, timeout=30).read()
                  print("Sent Discord failure notification.")
                  break
              except urllib.error.HTTPError as e:
                  if e.code == 429 and attempt < 3:
                      retry_after = 2.0
                      try:
                          body = e.read().decode("utf-8")
                          details = json.loads(body)
                          retry_after = float(details.get("retry_after", retry_after))
                      except Exception:
                          pass
                      sleep_for = max(0.5, retry_after) + 0.25
                      print(f"Failure alert rate-limited, retrying in {sleep_for:.2f}s.")
                      time.sleep(sleep_for)
                      continue

                  print(f"Discord failure notification skipped due to HTTP error: {e}")
                  break
              except Exception as e:
                  print(f"Discord failure notification skipped due to error: {e}")
                  break
          PY
